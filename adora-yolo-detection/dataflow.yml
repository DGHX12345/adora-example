nodes:
  - id: webcam
    path: webcam.py
    inputs:
      tick: adora/timer/millis/50
    outputs:
      - image
    env:
      CAMERA_INDEX: 4

  - id: object_detection
    path: object_detection.py
    restart_policy: on-failure    # [Adora独有] 节点崩溃后自动重启，Dora无此功能
    inputs:
      image: webcam/image
    outputs:
      - bbox

  - id: plot
    path: plot.py
    restart_policy: on-failure    # [Adora独有] 节点崩溃后自动重启，Dora无此功能
    inputs:
      image: webcam/image
      bbox: object_detection/bbox
